{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Forgot Password</h1>
        <p class="text-muted">
          Enter your account email to generate a password reset link.
        </p>

        <form method="post" action="{{ url_for('forgot_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" required>
          </div>

          <button class="btn btn-primary w-100" type="submit">Generate Reset Link</button>
        </form>

        {% if reset_url %}
        <div class="mt-4">
          <label class="form-label">Reset Link</label>
          <input class="form-control" value="{{ reset_url }}" onclick="this.select()" readonly>
          <div class="form-text">This link expires in {{ reset_expiry_hours }} hour{% if reset_expiry_hours != 1 %}s{% endif %}.</div>
        </div>
        {% endif %}

        <div class="text-center mt-3">
          <a href="{{ url_for('login') }}">Back to login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
