{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-5">
        <div class="text-uppercase text-muted small mb-2">404</div>
        <h1 class="h3 mb-3">Page Not Found</h1>
        <p class="text-muted mb-4">
          The page you were looking for does not exist or may have been moved.
        </p>
        <div class="d-flex justify-content-center flex-wrap gap-2">
          <a class="btn btn-primary btn-sm" href="{{ url_for('index') }}">Go Home</a>
          {% if me %}
            <a class="btn btn-outline-primary btn-sm" href="{{ url_for('select_cafe') }}">Choose Cafe</a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
