{% extends "base.html" %}
{% block content %}

<div class="mb-4">
  <h1 class="h4 mb-1">Global Settings</h1>
  <p class="text-muted mb-0">
    Control app-wide behaviour and the default settings applied to new cafes.
  </p>
</div>

<form method="post" action="{{ url_for('admin_global_settings') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

  <div class="row g-4">
    <div class="col-12 col-lg-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body p-4">
          <h2 class="h5 mb-3">Live App Controls</h2>

          <div class="mb-3">
            <label class="form-label">Site Name</label>
            <input class="form-control" name="site_name" value="{{ settings.site_name }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password Reset Expiry (hours)</label>
            <input type="number" class="form-control" name="password_reset_expiry_hours" min="1" value="{{ settings.password_reset_expiry_hours }}">
          </div>

          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="allow_public_registration" id="allow_public_registration" {% if settings.allow_public_registration %}checked{% endif %}>
            <label class="form-check-label" for="allow_public_registration">Allow public account registration</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="allow_global_manager_invites" id="allow_global_manager_invites" {% if settings.allow_global_manager_invites %}checked{% endif %}>
            <label class="form-check-label" for="allow_global_manager_invites">Allow manager invite links system-wide</label>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body p-4">
          <h2 class="h5 mb-3">New Cafe Defaults</h2>

          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label">Default Stamps Required</label>
              <input type="number" class="form-control" name="default_stamps_required" min="1" value="{{ settings.default_stamps_required }}">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Default Points Required</label>
              <input type="number" class="form-control" name="default_points_required" min="1" value="{{ settings.default_points_required }}">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Default Points Per Purchase</label>
              <input type="number" class="form-control" name="default_points_per_purchase" min="1" value="{{ settings.default_points_per_purchase }}">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Default Invite Expiry (days)</label>
              <input type="number" class="form-control" name="default_invite_expiry_days" min="1" value="{{ settings.default_invite_expiry_days }}">
            </div>
          </div>

          <div class="mt-3">
            <label class="form-label">Default Reward Name</label>
            <input class="form-control" name="default_reward_name" value="{{ settings.default_reward_name }}" required>
          </div>

          <div class="mt-3">
            <label class="form-label">Default Welcome Message</label>
            <input class="form-control" name="default_welcome_message" value="{{ settings.default_welcome_message }}" required>
          </div>

          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" name="default_allow_manager_invites" id="default_allow_manager_invites" {% if settings.default_allow_manager_invites %}checked{% endif %}>
            <label class="form-check-label" for="default_allow_manager_invites">New cafes allow manager invites by default</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-4">
    <button class="btn btn-primary" type="submit">Save Global Settings</button>
  </div>
</form>

{% endblock %}
