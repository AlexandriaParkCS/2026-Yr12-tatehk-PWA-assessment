{% extends "base.html" %}
{% block content %}

<h1 class="h4 mb-3">Create User</h1>

<div class="row justify-content-center">
  <div class="col-lg-7">

    <div class="card shadow-sm">
      <div class="card-body">

        <form method="post" action="{{ url_for('admin_user_create') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input class="form-control" name="phone_number" type="tel">
          </div>

          <div class="alert alert-info">
            A welcome email will be sent with a secure link for the user to set their own password.
          </div>

          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="isActive" name="is_active" checked>
            <label class="form-check-label" for="isActive">
              Active account
            </label>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="isAdmin" name="is_global_admin">
            <label class="form-check-label" for="isAdmin">
              Global admin
            </label>
          </div>

          <button class="btn btn-primary w-100" type="submit">
            Create User
          </button>

          <div class="text-muted mt-3" style="font-size:0.9rem;">
            Tip: after creating a staff/manager user, assign them to a cafe from the user’s Manage page.
          </div>
        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
