{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-5">
        <div class="text-uppercase text-muted small mb-2">500</div>
        <h1 class="h3 mb-3">Something Went Wrong</h1>
        <p class="text-muted mb-4">
          The app hit an unexpected error. Try the action again, or return to a safer page.
        </p>
        <div class="d-flex justify-content-center flex-wrap gap-2">
          <a class="btn btn-primary btn-sm" href="{{ url_for('index') }}">Go Home</a>
          {% if me %}
            <a class="btn btn-outline-primary btn-sm" href="{{ url_for('select_cafe') }}">Choose Cafe</a>
          {% else %}
            <a class="btn btn-outline-primary btn-sm" href="{{ url_for('login') }}">Log In</a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
