{% extends "base.html" %}
{% block content %}

<div class="row g-3">

  <!-- Scanner -->
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h5">Staff – {{ active_cafe.name }}</h1>

        <div class="mb-2 text-muted" style="font-size:0.9rem;">
          Reward: <strong>{{ settings.reward_name }}</strong>
          ({{ settings.stamps_required }} stamps)
        </div>

        <div id="reader" style="width:100%;"></div>

        <div class="mt-3">
          <label class="form-label">Scanned Token</label>
          <input class="form-control" id="token" placeholder="Scan QR code…">
        </div>
      </div>
    </div>
  </div>

  <!-- Prompt Panel -->
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">

        <h2 class="h6">Customer</h2>

        <div id="emptyMsg" class="text-muted">
          Scan a QR code to load details.
        </div>

        <div id="promptBox" style="display:none;">

          <div class="mb-2">
            <div class="fw-semibold" id="pName"></div>
            <div class="text-muted" id="pEmail" style="font-size:0.9rem;"></div>
          </div>

          <div class="mb-3">
            <span class="badge text-bg-secondary" id="pStamps"></span>
            <span class="badge text-bg-success" id="pReward" style="display:none;"></span>
          </div>

          <div id="actionText" class="alert alert-info py-2"></div>

          <div class="d-flex gap-2">

            <form method="post" action="{{ url_for('staff_add_stamp_by_token') }}">
              <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
              <input type="hidden" name="token" id="addToken">
              <button class="btn btn-success" id="addBtn">Add Stamp</button>
            </form>

            <form method="post" action="{{ url_for('staff_redeem_by_token') }}">
              <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
              <input type="hidden" name="token" id="redeemToken">
              <button class="btn btn-warning" id="redeemBtn">Redeem</button>
            </form>

          </div>

        </div>

      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
const tokenInput = document.getElementById("token");
const emptyMsg = document.getElementById("emptyMsg");
const promptBox = document.getElementById("promptBox");

const pName = document.getElementById("pName");
const pEmail = document.getElementById("pEmail");
const pStamps = document.getElementById("pStamps");
const pReward = document.getElementById("pReward");
const actionText = document.getElementById("actionText");

const addBtn = document.getElementById("addBtn");
const redeemBtn = document.getElementById("redeemBtn");
const addToken = document.getElementById("addToken");
const redeemToken = document.getElementById("redeemToken");

function loadCustomer(token) {
  fetch(`/staff/lookup?token=${encodeURIComponent(token)}`)
    .then(r => r.json())
    .then(data => {

      if (!data.ok) {
        emptyMsg.textContent = data.error || "User not found";
        promptBox.style.display = "none";
        return;
      }

      emptyMsg.style.display = "none";
      promptBox.style.display = "block";

      const u = data.user;
      const c = data.card;

      pName.textContent = u.username;
      pEmail.textContent = u.email;
      pStamps.textContent = `Stamps: ${c.stamps}/${c.stamps_required}`;

      addToken.value = token;
      redeemToken.value = token;

      if (c.reward_available) {
        pReward.style.display = "inline-block";
        pReward.textContent = `${c.reward_name} Ready`;
        actionText.className = "alert alert-success py-2";
        actionText.innerHTML = `🎉 Redeem <strong>${c.reward_name}</strong> for ${u.username}?`;
        redeemBtn.disabled = false;
        addBtn.disabled = true;
      } else {
        pReward.style.display = "none";
        actionText.className = "alert alert-info py-2";
        actionText.innerHTML = `Add a stamp for <strong>${u.username}</strong>?`;
        redeemBtn.disabled = true;
        addBtn.disabled = false;
      }

    });
}

function onScanSuccess(decodedText) {
  tokenInput.value = decodedText;
  loadCustomer(decodedText);
}

const qr = new Html5Qrcode("reader");
Html5Qrcode.getCameras().then(cameras => {
  if (cameras.length) {
    qr.start(cameras[0].id, { fps: 10, qrbox: 220 }, onScanSuccess);
  }
});
</script>

{% endblock %}
