{% extends "base.html" %}
{% block content %}

<style>
.scan-panel {
  border-radius: 22px;
}

.user-preview {
  border-radius: 16px;
  border: 1px solid #eee;
  padding: 1rem;
  background: #fafafa;
}

.preview-value {
  font-size: 1.6rem;
  font-weight: 700;
}

.preview-label {
  font-size: 0.85rem;
  color: #666;
}

.action-buttons button {
  min-width: 140px;
}
</style>

<div class="row g-4">

<!-- LEFT COLUMN -->
<div class="col-lg-6">

<div class="card shadow-sm border-0 scan-panel">
<div class="card-body p-4">

<h2 class="h5 mb-3">Scan Customer QR</h2>

<div id="reader" style="width:100%"></div>

<div class="text-muted small mt-2">
Point the camera at a customer QR code.
</div>

</div>
</div>


<div class="card shadow-sm border-0 mt-4">
<div class="card-body p-4">

<h2 class="h5 mb-3">Search Customer</h2>

<input
type="text"
id="userSearch"
class="form-control"
placeholder="Search by username or email">

<div id="searchResults" class="mt-3"></div>

</div>
</div>

</div>

<!-- RIGHT COLUMN -->
<div class="col-lg-6">

<div class="card shadow-sm border-0">
<div class="card-body p-4">

<h2 class="h5 mb-3">Customer</h2>

<div id="customerPreview" class="user-preview text-center">

<div class="text-muted">
Scan or search for a customer
</div>

</div>

</div>
</div>

</div>

</div>

<!-- ACTION FORMS -->
<form id="stampForm" method="post" action="{{ url_for('staff_add_stamp_by_token') }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
<input type="hidden" name="token" id="stampToken">
</form>

<form id="redeemForm" method="post" action="{{ url_for('staff_redeem_by_token') }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
<input type="hidden" name="token" id="redeemToken">
</form>


<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let lastUserToken = null


function renderPreview(user) {

const container = document.getElementById("customerPreview")

lastUserToken = user.qr_token

document.getElementById("stampToken").value = user.qr_token
document.getElementById("redeemToken").value = user.qr_token

let rewardLabel = user.reward_name
let unitLabel = user.unit_label || "points"

container.innerHTML = `

<div class="mb-3">

<div class="h5">${user.username}</div>

<div class="text-muted small">${user.email}</div>

</div>

<div class="preview-value">
${user.current} / ${user.required}
</div>

<div class="preview-label mb-3">
${unitLabel}
</div>

<div class="progress mb-4" style="height:10px">
<div class="progress-bar" style="width:${user.progress}%"></div>
</div>

<div class="action-buttons d-flex gap-2 justify-content-center">

<button
class="btn btn-primary"
onclick="addProgress()">
Add
</button>

<button
class="btn btn-warning"
onclick="redeemReward()"
${user.reward_available ? "" : "disabled"}>
Redeem
</button>

</div>

<div class="mt-3 text-muted small">

Reward: <strong>${rewardLabel}</strong>

</div>

`
}


function addProgress() {

if(!lastUserToken) return

document.getElementById("stampForm").submit()

}

function redeemReward() {

if(!lastUserToken) return

document.getElementById("redeemForm").submit()

}



async function lookupToken(token){

const res = await fetch(`/staff/lookup?token=${token}`)

const data = await res.json()

if(!data.ok){
alert(data.error)
return
}

renderPreview({
username:data.user.username,
email:data.user.email,
qr_token:token,
current:data.card.current,
required:data.card.required,
progress:data.card.progress,
reward_name:data.card.reward_name,
reward_available:data.card.reward_available,
unit_label:data.card.unit_label
})

}



function startScanner(){

const html5QrCode = new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(cameras => {

if(!cameras.length) return

let backCamera = cameras.find(c => c.label.toLowerCase().includes("back"))

let cameraId = backCamera ? backCamera.id : cameras[0].id

html5QrCode.start(
cameraId,
{
fps:10,
qrbox:250
},
(decodedText) => {

lookupToken(decodedText)

},
(err)=>{}
)

})

}

startScanner()



const searchInput = document.getElementById("userSearch")
const results = document.getElementById("searchResults")

searchInput.addEventListener("input", async ()=>{

let q = searchInput.value.trim()

if(q.length < 2){
results.innerHTML = ""
return
}

const res = await fetch(`/staff/search-json?q=${q}`)

const users = await res.json()

results.innerHTML = ""

users.forEach(u=>{

let div = document.createElement("div")

div.className = "border rounded p-2 mb-2 cursor-pointer"

div.innerHTML = `
<strong>${u.username}</strong><br>
<small>${u.email}</small>
`

div.onclick = () => {

renderPreview({
username:u.username,
email:u.email,
qr_token:u.qr_token,
current:u.current,
required:u.required,
progress:(u.current/u.required)*100,
reward_name:u.reward_name,
reward_available:u.reward_available,
unit_label:u.unit_label
})

}

results.appendChild(div)

})

})

</script>

{% endblock %}
