{% extends "base.html" %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h5">Staff: QR Scanner</h1>
        <div id="reader" style="width:100%;"></div>

        <form class="mt-3" method="post" action="/staff/add-stamp-by-token">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <label class="form-label">Scanned Token</label>
          <input class="form-control" id="token" name="token" placeholder="Scan a QR code…" required>
          <button class="btn btn-success mt-2" type="submit">Add Stamp</button>
        </form>

        <p class="text-muted mt-2 mb-0" style="font-size:0.9rem;">
          Camera tip: mobile + HTTPS (or localhost) for permissions.
        </p>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h6">Live User Search</h2>
        <input class="form-control" id="liveSearch" placeholder="Type 2+ chars (starts-with)…">
        <div id="searchResults" class="list-group mt-2"></div>
        <p class="text-muted mt-2 mb-0" style="font-size:0.9rem;">
          Shows stamps + reward status. Matches highlight.
        </p>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
  const tokenInput = document.getElementById("token");
  function onScanSuccess(decodedText) {
    tokenInput.value = decodedText;
  }
  const qr = new Html5Qrcode("reader");
  Html5Qrcode.getCameras().then(cameras => {
    if (cameras && cameras.length) {
      qr.start(cameras[0].id, { fps: 10, qrbox: 220 }, onScanSuccess);
    }
  }).catch(err => console.error(err));
</script>

<script>
  const input = document.getElementById("liveSearch");
  const resultsBox = document.getElementById("searchResults");
  let timer = null;

  function escapeHtml(str) {
    return (str || "").replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
    }[m]));
  }

  function highlightPrefix(text, q) {
    const safe = escapeHtml(text);
    const safeQ = escapeHtml(q);
    if (!q) return safe;
    const lower = text.toLowerCase();
    const lowerQ = q.toLowerCase();
    if (lower.startsWith(lowerQ)) {
      return `<mark>${safe.slice(0, q.length)}</mark>${safe.slice(q.length)}`;
    }
    return safe;
  }

  async function runSearch(q) {
    if (!q || q.length < 2) {
      resultsBox.innerHTML = "";
      return;
    }

    const res = await fetch(`/staff/search-json?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if (!data.length) {
      resultsBox.innerHTML = `<div class="list-group-item">No matches</div>`;
      return;
    }

    resultsBox.innerHTML = data.map(u => `
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <strong>${highlightPrefix(u.username, q)}</strong>
          <div class="text-muted" style="font-size:0.9rem;">
            ${highlightPrefix(u.email, q)} • ${escapeHtml(u.role)}
            ${u.reward_available ? ' • <span class="badge text-bg-success">Reward</span>' : ''}
          </div>
          <div style="font-size:0.9rem;">
            Stamps: <strong>${u.stamps}/9</strong>
          </div>
        </div>

        <form method="post" action="/staff/add-stamp-by-token" class="m-0">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <input type="hidden" name="token" value="${escapeHtml(u.qr_token)}">
          <button class="btn btn-success btn-sm" type="submit">Add</button>
        </form>
      </div>
    `).join("");
  }

  input.addEventListener("input", () => {
    const q = input.value.trim();
    clearTimeout(timer);
    timer = setTimeout(() => runSearch(q), 180);
  });
</script>
{% endblock %}
