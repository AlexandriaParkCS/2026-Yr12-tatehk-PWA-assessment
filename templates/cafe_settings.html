{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-7">

    <div class="card shadow-sm">
      <div class="card-body">

        <h1 class="h4 mb-2">Cafe Settings</h1>
        <p class="text-muted mb-4">
          Cafe: <strong>{{ active_cafe.name }}</strong>
        </p>

        <form method="post" action="{{ url_for('cafe_settings_post') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-3">
            <label class="form-label">Stamps Required for Reward</label>
            <input type="number" class="form-control" name="stamps_required"
                   min="1" max="50" value="{{ settings.stamps_required }}" required>
            <div class="form-text">Common values: 6, 9, 10.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Reward Name</label>
            <input class="form-control" name="reward_name"
                   value="{{ settings.reward_name }}" required>
            <div class="form-text">Example: “Free Coffee”, “Free Hot Drink”.</div>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="staffRedeem"
                   name="staff_can_redeem" {% if settings.staff_can_redeem %}checked{% endif %}>
            <label class="form-check-label" for="staffRedeem">
              Allow staff to redeem rewards (not just managers)
            </label>
          </div>

          <button class="btn btn-primary w-100" type="submit">
            Save Settings
          </button>
        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
